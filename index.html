<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date With Me? 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ffc0cb, #ff69b4);
}

.container{
    text-align:center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:60px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
    color:white;
    font-size:40px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.yes{
    background:white;
    color:#ff1493;
}

.yes:hover{
    background:#ff1493;
    color:white;
    transform:scale(1.1);
}

.no{
    background:#ff4d6d;
    color:white;
}

.no:hover{
    transform:scale(1.1);
}

.message{
    margin-top:30px;
    font-size:22px;
    color:white;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Will you go on a date with me? 💕</h1>
    <div class="buttons">
        <button class="yes" onclick="sayYes()">YES</button>
        <button class="no" onclick="sayNo(this)">NO</button>
    </div>
    <div class="message" id="message"></div>
</div>

<script>
function sayYes(){
    document.getElementById("message").innerHTML = 
    "YAYYY ILOVEYOUUUUUU";
}

function sayNo(button){
    button.innerHTML = "YES YES YES 💖";
    button.style.background = "white";
    button.style.color = "#ff1493";
}
</script>

</body>
</html>
